id: ai-installed-app-roots
name: Installed AI application roots
category: ai-installed-app
platforms: [windows, linux, macos]
paths:
  windows:
    - '%LOCALAPPDATA%\Programs\Cursor'
    - '%LOCALAPPDATA%\Programs\Windsurf'
    - '%LOCALAPPDATA%\Programs\Trae'
    - '%LOCALAPPDATA%\Programs\Claude'
    - '%LOCALAPPDATA%\Programs\Codeium'
    - '%LOCALAPPDATA%\Programs\LM Studio'
    - '%LOCALAPPDATA%\Programs\Ollama'
    - '%LOCALAPPDATA%\Programs\Continue'
  linux:
    - '/opt/Cursor'
    - '/opt/Windsurf'
    - '/opt/Trae'
    - '/opt/Claude'
    - '/opt/Codeium'
    - '/opt/LM Studio'
    - '/opt/Ollama'
    - '/opt/Continue'
  macos:
    - '/Applications/Cursor.app'
    - '/Applications/Windsurf.app'
    - '/Applications/Trae.app'
    - '/Applications/Claude.app'
    - '/Applications/Codeium.app'
    - '/Applications/LM Studio.app'
    - '/Applications/Ollama.app'
    - '/Applications/Continue.app'
risk: review
cleanup:
  method: report-only
exclusions: []
reason: "Installed AI application roots can be large, but should be managed through uninstallers or app settings rather than filesystem cleanup."
warnings:
  - "Do not quarantine installed application roots automatically; use this rule for diagnosis and relocation/uninstall decisions."
