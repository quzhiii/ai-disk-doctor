id: ai-tool-installers
name: AI tool installers in Downloads
category: ai-installer
platforms: [windows, linux, macos]
paths:
  windows:
    - '%USERPROFILE%\Downloads\*Cursor*Setup*.exe'
    - '%USERPROFILE%\Downloads\*Cursor*.msi'
    - '%USERPROFILE%\Downloads\*Windsurf*Setup*.exe'
    - '%USERPROFILE%\Downloads\*Windsurf*.msi'
    - '%USERPROFILE%\Downloads\*Trae*Setup*.exe'
    - '%USERPROFILE%\Downloads\*Trae*.msi'
    - '%USERPROFILE%\Downloads\*Claude*Setup*.exe'
    - '%USERPROFILE%\Downloads\*Gemini*Setup*.exe'
    - '%USERPROFILE%\Downloads\*Codeium*Setup*.exe'
    - '%USERPROFILE%\Downloads\*Continue*Setup*.exe'
    - '%USERPROFILE%\Downloads\*LM Studio*.exe'
    - '%USERPROFILE%\Downloads\*OllamaSetup*.exe'
  linux:
    - '~/Downloads/*Cursor*.AppImage'
    - '~/Downloads/*Cursor*.deb'
    - '~/Downloads/*Cursor*.rpm'
    - '~/Downloads/*Windsurf*.AppImage'
    - '~/Downloads/*Windsurf*.deb'
    - '~/Downloads/*Windsurf*.rpm'
    - '~/Downloads/*Trae*.AppImage'
    - '~/Downloads/*Trae*.deb'
    - '~/Downloads/*Trae*.rpm'
    - '~/Downloads/*Claude*.AppImage'
    - '~/Downloads/*Claude*.deb'
    - '~/Downloads/*Claude*.rpm'
    - '~/Downloads/*Gemini*.AppImage'
    - '~/Downloads/*Gemini*.deb'
    - '~/Downloads/*Gemini*.rpm'
    - '~/Downloads/*Codeium*.AppImage'
    - '~/Downloads/*Codeium*.deb'
    - '~/Downloads/*Codeium*.rpm'
    - '~/Downloads/*Continue*.AppImage'
    - '~/Downloads/*Continue*.deb'
    - '~/Downloads/*Continue*.rpm'
    - '~/Downloads/*LM Studio*.AppImage'
    - '~/Downloads/*LM Studio*.deb'
    - '~/Downloads/*LM Studio*.rpm'
    - '~/Downloads/*Ollama*.AppImage'
    - '~/Downloads/*Ollama*.deb'
    - '~/Downloads/*Ollama*.rpm'
  macos:
    - '~/Downloads/*Cursor*.dmg'
    - '~/Downloads/*Cursor*.zip'
    - '~/Downloads/*Cursor*.pkg'
    - '~/Downloads/*Windsurf*.dmg'
    - '~/Downloads/*Windsurf*.zip'
    - '~/Downloads/*Windsurf*.pkg'
    - '~/Downloads/*Trae*.dmg'
    - '~/Downloads/*Trae*.zip'
    - '~/Downloads/*Trae*.pkg'
    - '~/Downloads/*Claude*.dmg'
    - '~/Downloads/*Claude*.zip'
    - '~/Downloads/*Claude*.pkg'
    - '~/Downloads/*Gemini*.dmg'
    - '~/Downloads/*Gemini*.zip'
    - '~/Downloads/*Gemini*.pkg'
    - '~/Downloads/*Codeium*.dmg'
    - '~/Downloads/*Codeium*.zip'
    - '~/Downloads/*Codeium*.pkg'
    - '~/Downloads/*Continue*.dmg'
    - '~/Downloads/*Continue*.zip'
    - '~/Downloads/*Continue*.pkg'
    - '~/Downloads/*LM Studio*.dmg'
    - '~/Downloads/*LM Studio*.zip'
    - '~/Downloads/*LM Studio*.pkg'
    - '~/Downloads/*Ollama*.dmg'
    - '~/Downloads/*Ollama*.zip'
    - '~/Downloads/*Ollama*.pkg'
risk: safe
cleanup:
  method: quarantine
exclusions: []
reason: "Downloaded AI tool installers are usually recoverable after installation and are good quarantine candidates."
warnings:
  - "Confirm the installed app works before quarantining installer files."
