id: claude-home
name: Claude home directory
category: ai-agent
platforms: [windows, linux, macos]
paths:
  windows:
    - "%USERPROFILE%\\.claude"
    - "%USERPROFILE%\\.codex"
    - "%USERPROFILE%\\.gemini"
    - "%APPDATA%\\ai.opencode.desktop"
  linux:
    - "~/.claude"
    - "~/.codex"
    - "~/.gemini"
    - "~/.config/ai.opencode.desktop"
  macos:
    - "~/Library/Application Support/Claude"
    - "~/.claude"
    - "~/.codex"
    - "~/.gemini"
risk: review
cleanup:
  method: report-only
exclusions: []
reason: "Agent state may contain chat history, sessions, settings, and cached tool state that should be reviewed before cleanup."
warnings:
  - "Do not remove the root directory automatically."
