<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 磁盘足迹</title>
<style>
:root {
  --ink: #1a1a1a;
  --paper: #ffffff;
  --accent: #1a5276;
  --accent-light: #e8f0f6;
  --muted: #888888;
  --safe: #1e8449;
  --safe-bg: #eafaf1;
  --review: #d4ac0d;
  --review-bg: #fef9e7;
  --dangerous: #c0392b;
  --dangerous-bg: #fdedec;
  --system: #5b5b5b;
  --sp-xs: 4px;
  --sp-s: 8px;
  --sp-m: 16px;
  --sp-l: 24px;
  --sp-xl: 40px;
  --sp-xxl: 64px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Inter, system-ui, -apple-system, sans-serif;
  color: var(--ink);
  background: var(--paper);
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--sp-xxl) var(--sp-xl);
  line-height: 1.5;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: var(--sp-xxl);
  flex-wrap: wrap;
  gap: var(--sp-m);
}

header h1 {
  font-size: min(5vw, 42px);
  font-weight: 200;
  color: var(--ink);
  letter-spacing: -0.02em;
}

.header-right {
  display: flex;
  align-items: center;
  gap: var(--sp-m);
}

.header-right time {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

#lang-toggle {
  font-family: Inter, system-ui, -apple-system, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-light);
  border: 1px solid var(--accent);
  padding: var(--sp-xs) var(--sp-m);
  cursor: pointer;
}

#lang-toggle:hover {
  background: var(--accent);
  color: var(--paper);
}

.kpi-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-xl);
  margin-bottom: var(--sp-xl);
}

.kpi-card {
  border-top: 2px solid var(--accent-light);
  padding-top: var(--sp-m);
  position: relative;
  cursor: help;
}

.kpi-value {
  font-size: min(8vw, 96px);
  font-weight: 200;
  color: var(--accent);
  line-height: 1;
  margin-bottom: var(--sp-xs);
}

.kpi-label {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.kpi-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 0;
  background: var(--ink);
  color: var(--paper);
  font-size: 12px;
  padding: var(--sp-s) var(--sp-m);
  max-width: 280px;
  line-height: 1.4;
  z-index: 10;
}

.kpi-card:hover .kpi-tooltip {
  display: block;
}

.risk-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-m);
  margin-bottom: var(--sp-xxl);
}

.risk-card {
  padding: var(--sp-m);
  border-left: 3px solid;
  cursor: pointer;
}

.risk-card.safe {
  background: var(--safe-bg);
  border-left-color: var(--safe);
}

.risk-card.review {
  background: var(--review-bg);
  border-left-color: var(--review);
}

.risk-card.dangerous {
  background: var(--dangerous-bg);
  border-left-color: var(--dangerous);
}

.risk-card.active {
  outline: 2px solid var(--ink);
  outline-offset: -2px;
}

.risk-card-name {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: var(--sp-xs);
}

.risk-card-value {
  font-size: 28px;
  font-weight: 200;
  color: var(--ink);
  line-height: 1;
}

.risk-card-count {
  font-size: 13px;
  color: var(--muted);
  margin-top: var(--sp-xs);
}

.section-title {
  font-size: min(3vw, 24px);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: var(--sp-l);
  padding-bottom: var(--sp-s);
  border-bottom: 1px solid var(--accent-light);
}

.treemap {
  display: flex;
  gap: var(--sp-s);
  margin-bottom: var(--sp-xxl);
  min-height: 80px;
  flex-wrap: wrap;
}

.treemap-block {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: var(--sp-m);
  border-left: 3px solid transparent;
  cursor: pointer;
  flex: 1;
  min-width: 120px;
}

.treemap-block.safe {
  background: var(--safe-bg);
  border-left-color: var(--safe);
}

.treemap-block.review {
  background: var(--review-bg);
  border-left-color: var(--review);
}

.treemap-block.dangerous {
  background: var(--dangerous-bg);
  border-left-color: var(--dangerous);
}

.treemap-block.system {
  background: #f4f4f4;
  border-left-color: var(--system);
}

.treemap-block.active {
  outline: 2px solid var(--ink);
  outline-offset: -2px;
}

.treemap-block-name {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: var(--sp-xs);
}

.treemap-block-size {
  font-size: min(3vw, 32px);
  font-weight: 200;
  color: var(--ink);
  line-height: 1;
}

.bar-chart {
  margin-bottom: var(--sp-xxl);
}

.bar-group.filtered {
  display: none;
}

.bar-row {
  display: grid;
  grid-template-columns: 200px 1fr 80px;
  gap: var(--sp-m);
  align-items: center;
  padding: var(--sp-s) 0;
  border-bottom: 1px solid #f0f0f0;
}

.bar-row.bar-clickable {
  cursor: pointer;
}

.bar-row.bar-clickable:hover {
  background: #fafafa;
}

.bar-row.expanded {
  background: var(--accent-light);
}

.bar-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-track {
  height: 16px;
  background: var(--accent-light);
}

.bar-fill {
  height: 100%;
  background: var(--accent);
}

.bar-fill.safe { background: var(--safe); }
.bar-fill.review { background: var(--review); }
.bar-fill.dangerous { background: var(--dangerous); }
.bar-fill.system { background: var(--system); }

.bar-size {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-align: right;
}

.tool-detail {
  display: none;
  padding: var(--sp-m);
  background: #fafafa;
  border-left: 3px solid var(--accent);
  margin-bottom: var(--sp-s);
}

.tool-detail.expanded {
  display: block;
}

.tool-detail-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: var(--sp-s);
  padding: var(--sp-xs) 0;
  font-size: 13px;
}

.tool-detail-label {
  font-weight: 600;
  color: var(--muted);
}

.tool-detail-value {
  color: var(--ink);
  word-break: break-all;
}

.tool-detail-suggestion {
  margin-top: var(--sp-m);
  padding-top: var(--sp-s);
  border-top: 1px solid var(--accent-light);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.safe-reclaim {
  margin-bottom: var(--sp-xxl);
}

.reclaim-controls {
  display: flex;
  align-items: center;
  gap: var(--sp-m);
  margin-bottom: var(--sp-m);
  flex-wrap: wrap;
}

.reclaim-controls button {
  font-family: Inter, system-ui, -apple-system, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-light);
  border: 1px solid var(--accent);
  padding: var(--sp-xs) var(--sp-m);
  cursor: pointer;
}

.reclaim-controls button:hover {
  background: var(--accent);
  color: var(--paper);
}

.selected-summary {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
}

.reclaim-list {
  list-style: none;
  margin-bottom: var(--sp-m);
}

.reclaim-item {
  border-bottom: 1px solid #f0f0f0;
}

.reclaim-item:last-child {
  border-bottom: none;
}

.reclaim-item label {
  display: flex;
  align-items: center;
  gap: var(--sp-m);
  padding: var(--sp-s) 0;
  cursor: pointer;
  font-size: 13px;
  flex-wrap: wrap;
}

.reclaim-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.reclaim-name {
  font-weight: 500;
  color: var(--ink);
  min-width: 120px;
}

.reclaim-count {
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
}

.reclaim-path {
  color: var(--muted);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.reclaim-size {
  color: var(--accent);
  font-weight: 500;
  white-space: nowrap;
}

.disclaimer {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
  padding: var(--sp-m);
  background: #fafafa;
}

.no-data {
  font-size: 14px;
  color: var(--muted);
  padding: var(--sp-xl) 0;
  text-align: center;
}

@media (max-width: 768px) {
  body {
    padding: var(--sp-l);
  }

  .kpi-row {
    grid-template-columns: 1fr;
  }

  .risk-cards {
    grid-template-columns: 1fr;
  }

  .bar-row {
    grid-template-columns: 120px 1fr 60px;
    gap: var(--sp-s);
  }

  .treemap {
    flex-direction: column;
  }

  .tool-detail-row {
    grid-template-columns: 80px 1fr;
  }

  .reclaim-item label {
    flex-direction: column;
    align-items: flex-start;
    gap: var(--sp-xs);
  }
}

</style>
</head>

(function() {
  var currentLang = (navigator.language || 'en').startsWith('zh') ? 'zh' : 'en';
  var activeCategory = null;
  var activeRisk = null;

  function translateToolName(name) {
    var names = window.I18N[currentLang] && window.I18N[currentLang].tool_names;
    return (names && names[name]) || name;
  }

  function applyLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    var els = document.querySelectorAll('[data-i18n]');
    for (var i = 0; i < els.length; i++) {
      var key = els[i].getAttribute('data-i18n');
      var text = window.I18N[lang] && window.I18N[lang][key];
      if (text !== undefined) els[i].textContent = text;
    }
    var btn = document.getElementById('lang-toggle');
    if (btn) btn.textContent = lang === 'zh' ? "\u{1f310} EN" : "\u{1f310} \u{4e2d}\u{6587}";
    updateOpenToolDetails();
    updateReclaimSummary();
    var cardLabels = document.querySelectorAll('.risk-card-name');
    for (var i = 0; i < cardLabels.length; i++) {
      var k = cardLabels[i].getAttribute('data-i18n');
      if (k && window.I18N[lang] && window.I18N[lang][k]) cardLabels[i].textContent = window.I18N[lang][k];
    }
    var barLabels = document.querySelectorAll('.bar-label');
    for (var i = 0; i < barLabels.length; i++) {
      var raw = barLabels[i].getAttribute('data-raw-name');
      if (raw) barLabels[i].textContent = translateToolName(raw);
    }
    var tmNames = document.querySelectorAll('.treemap-block-name');
    for (var i = 0; i < tmNames.length; i++) {
      var raw = tmNames[i].getAttribute('data-raw-name');
      if (raw) tmNames[i].textContent = translateToolName(raw);
    }
    var reclaimNames = document.querySelectorAll('.reclaim-name');
    for (var i = 0; i < reclaimNames.length; i++) {
      var raw = reclaimNames[i].getAttribute('data-raw-name');
      if (raw) reclaimNames[i].textContent = translateToolName(raw);
    }
  }

  function updateOpenToolDetails() {
    var details = document.querySelectorAll('.tool-detail.expanded');
    for (var i = 0; i < details.length; i++) {
      var idx = parseInt(details[i].getAttribute('data-tool-index'));
      renderToolDetail(details[i], idx);
    }
  }

  function renderToolDetail(container, idx) {
    var tool = window.TOOL_DATA[idx];
    if (!tool) return;
    var L = window.I18N[currentLang] || window.I18N['zh'];
    var toolName = translateToolName(tool.name);
    container.innerHTML =

      '<div class="tool-detail-row"><span class="tool-detail-label">' + esc(L.size_label) + '</span><span class="tool-detail-value">' + esc(tool.size_display) + '</span></div>' +
      '<div class="tool-detail-suggestion"><strong>' + esc(L.suggestion_label) + '</strong>: ' + esc(currentLang === 'en' ? tool.suggestion_en : tool.suggestion_zh) + '</div>';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function formatSizeHuman(bytes) {
    if (bytes === 0) return '0 B';
    var units = ['B', 'KB', 'MB', 'GB', 'TB'];
    var i = 0, val = bytes;
    while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
    return i === 0 ? bytes + ' B' : val.toFixed(1) + ' ' + units[i];
  }

  function updateReclaimSummary() {
    var cbs = document.querySelectorAll('.reclaim-checkbox:checked');
    var count = cbs.length;
    var total = 0;
    for (var i = 0; i < cbs.length; i++) {
      var item = cbs[i].closest('.reclaim-item');
      if (item) total += parseInt(item.getAttribute('data-size')) || 0;
    }
    var sum = document.getElementById('reclaim-summary');
    if (sum) {
      var tmpl = (window.I18N[currentLang] || {}).selected_summary || 'Selected {n} items, {size} reclaimable';
      sum.textContent = tmpl.replace('{n}', count).replace('{size}', formatSizeHuman(total));
    }
  }

  function applyFilters() {
    var groups = document.querySelectorAll('.bar-group');
    for (var i = 0; i < groups.length; i++) {
      var g = groups[i];
      if (!g.hasAttribute('data-category') && !g.hasAttribute('data-risk')) continue;
      var catOk = !activeCategory || g.getAttribute('data-category') === activeCategory;
      var riskOk = !activeRisk || g.getAttribute('data-risk') === activeRisk;
      if (catOk && riskOk) g.classList.remove('filtered');
      else g.classList.add('filtered');
    }
    var blocks = document.querySelectorAll('.treemap-block');
    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (b.hasAttribute('data-category') && activeCategory) {
        if (b.getAttribute('data-category') === activeCategory) b.classList.add('active');
        else b.classList.remove('active');
      } else {
        b.classList.remove('active');
      }
      if (activeRisk && b.getAttribute('data-risk') !== activeRisk) b.style.opacity = '0.3';
      else b.style.opacity = '1';
    }
  }

  // --- init ---
  applyLang(currentLang);

  // --- lang toggle ---
  document.getElementById('lang-toggle').addEventListener('click', function() {
    applyLang(currentLang === 'zh' ? 'en' : 'zh');
  });

  // --- treemap filtering ---
  var tblocks = document.querySelectorAll('.treemap-block');
  for (var i = 0; i < tblocks.length; i++) {
    tblocks[i].addEventListener('click', function() {
      var cat = this.getAttribute('data-category');
      if (!cat) return;
      if (activeCategory === cat) {
        activeCategory = null;
        this.classList.remove('active');
      } else {
        var prev = document.querySelector('.treemap-block.active');
        if (prev) prev.classList.remove('active');
        activeCategory = cat;
        this.classList.add('active');
      }
      applyFilters();
    });
  }

  // --- risk card filtering ---
  var rcards = document.querySelectorAll('.risk-card');
  for (var i = 0; i < rcards.length; i++) {
    rcards[i].addEventListener('click', function() {
      var risk = this.getAttribute('data-risk');
      if (!risk) return;
      if (activeRisk === risk) {
        activeRisk = null;
        this.classList.remove('active');
      } else {
        var prev = document.querySelector('.risk-card.active');
        if (prev) prev.classList.remove('active');
        activeRisk = risk;
        this.classList.add('active');
      }
      applyFilters();
    });
  }

  // --- bar chart expansion ---
  var brows = document.querySelectorAll('.bar-clickable');
  for (var i = 0; i < brows.length; i++) {
    brows[i].addEventListener('click', function() {
      var group = this.parentElement;
      var detail = group.querySelector('.tool-detail');
      var wasExpanded = this.classList.contains('expanded');

      var allExp = document.querySelectorAll('.bar-clickable.expanded');
      for (var j = 0; j < allExp.length; j++) {
        allExp[j].classList.remove('expanded');
        var pg = allExp[j].parentElement;
        var pd = pg.querySelector('.tool-detail');
        if (pd) pd.classList.remove('expanded');
      }

      if (!wasExpanded) {
        this.classList.add('expanded');
        if (!detail) {
          detail = document.createElement('div');
          detail.className = 'tool-detail expanded';
          detail.setAttribute('data-tool-index', this.getAttribute('data-tool-index'));
          group.appendChild(detail);
        } else {
          detail.classList.add('expanded');
        }
        renderToolDetail(detail, parseInt(this.getAttribute('data-tool-index')));
      }
    });
  }

  // --- safe reclaim checkboxes ---
  var cbs2 = document.querySelectorAll('.reclaim-checkbox');
  for (var i = 0; i < cbs2.length; i++) {
    cbs2[i].addEventListener('change', updateReclaimSummary);
  }

  // --- select all button ---
  var sab = document.getElementById('select-all-btn');
  if (sab) {
    sab.addEventListener('click', function() {
      var allCbs = document.querySelectorAll('.reclaim-checkbox');
      var allChecked = true;
      for (var i = 0; i < allCbs.length; i++) {
        if (!allCbs[i].checked) { allChecked = false; break; }
      }
      for (var i = 0; i < allCbs.length; i++) allCbs[i].checked = !allChecked;
      var L = window.I18N[currentLang] || {};
      this.textContent = allChecked ? (L.select_all || 'Select All') : (L.deselect_all || 'Deselect All');
      updateReclaimSummary();
    });
  }
})();

</script>
</body>
</html>
